document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 U+20B9, U+20F0, U+25CC, U+A830-A839, U+A8E0-A8FF, U+11B00-11B09;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Rajdhani';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"5c0be625-a33c-4db5-bf10-ed529a4a4ca6\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Rajdhani';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"afd8deee-04b5-4fc1-b88d-4f52396fff82\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin */\n@font-face {\n  font-family: 'Share Tech Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"21daedb2-0038-44ed-b010-69c475e0fc01\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   STAGE RESULT — Stage Clear 結算頁\n   Same white/blue glass + gold vocabulary as Stage Select / HUD.\n   Left column = full-body character 立繪 (image-slot the user fills),\n   replacing the old AI-dialogue + portrait strip.\n   ============================================================ */\n\n:root{\n  --accent:        #2f6fd0;\n  --panel-pct:     76%;\n\n  --accent-deep:   color-mix(in oklab, var(--accent) 66%, #06122c);\n  --accent-bright: color-mix(in oklab, var(--accent) 52%, #ffffff);\n  --accent-pale:   color-mix(in oklab, var(--accent) 16%, #ffffff);\n  --glow:          color-mix(in oklab, var(--accent) 40%, #ffffff);\n  --ink:           color-mix(in oklab, var(--accent) 64%, #08152e);\n  --ink-soft:      color-mix(in oklab, var(--accent) 50%, #38507a);\n  --hair:          color-mix(in srgb, var(--accent) 55%, transparent);\n  --hair-soft:     color-mix(in srgb, var(--accent) 30%, transparent);\n  --panel-tint:    color-mix(in srgb, var(--accent) 13%, #ffffff);\n  --panel:         color-mix(in srgb, var(--panel-tint) var(--panel-pct), transparent);\n\n  --gold:          #f3c64d;\n  --gold-deep:     #c5891f;\n  --gold-bright:   #ffe6a0;\n\n  --font-hud:  'Rajdhani', 'Segoe UI', system-ui, sans-serif;\n  --font-mono: 'Share Tech Mono', ui-monospace, monospace;\n}\n\n*{ box-sizing:border-box; }\nhtml,body{ margin:0; height:100%; background:#05080f; overflow:hidden; }\nbody{ font-family:var(--font-hud); }\n\n/* ---- scale-to-fit stage ---- */\n#stage{\n  position:fixed; inset:0; background:#05080f;\n  display:flex; align-items:center; justify-content:center; overflow:hidden;\n}\n#frame{\n  position:relative; width:1920px; height:1080px;\n  transform-origin:center center; overflow:hidden; background:#bfe0f7;\n  box-shadow:0 30px 120px rgba(0,0,0,.6);\n}\n\n/* ============================================================\n   SKY BACKDROP\n   ============================================================ */\n#bg{ position:absolute; inset:0; overflow:hidden; }\n.sky{\n  position:absolute; inset:0;\n  background:linear-gradient(#b6e1fb 0%, #c8e8fb 30%, #def0fd 62%, #eef8ff 100%);\n}\n.sky::before{\n  content:\"\"; position:absolute; left:50%; top:-16%; width:70%; height:64%;\n  transform:translateX(-50%);\n  background:radial-gradient(closest-side, rgba(255,255,255,.9), transparent 70%);\n}\n.clouds{ position:absolute; inset:0; }\n.cloud{\n  position:absolute; background:#ffffff; border-radius:100px;\n  filter:blur(3px); opacity:.8;\n  box-shadow:0 22px 0 -6px rgba(255,255,255,.6);\n}\n#bg-slot{ position:absolute; inset:0; width:100%; height:100%; }\n#bg::after{\n  content:\"\"; position:absolute; inset:0; pointer-events:none;\n  background:\n    radial-gradient(120% 80% at 50% 26%, transparent 48%, rgba(20,49,95,.22) 100%),\n    linear-gradient(180deg, rgba(255,255,255,.18), transparent 30%);\n}\n\n/* ============================================================\n   TOP BANNER — STAGE CLEAR\n   ============================================================ */\n#banner{\n  position:absolute; left:1183px; top:46px; transform:translateX(-50%); z-index:100;\n  --n:34px; width:900px; height:132px;\n  background:var(--hair);\n  clip-path:polygon(0 50%, var(--n) 0, calc(100% - var(--n)) 0, 100% 50%,\n    calc(100% - var(--n)) 100%, var(--n) 100%);\n  filter:drop-shadow(0 20px 42px rgba(20,49,95,.5));\n}\n#banner .fill{\n  position:absolute; inset:2.5px; --n:31px;\n  background:linear-gradient(180deg, var(--accent-bright), var(--accent) 46%, var(--accent-deep));\n  clip-path:polygon(0 50%, var(--n) 0, calc(100% - var(--n)) 0, 100% 50%,\n    calc(100% - var(--n)) 100%, var(--n) 100%);\n  display:flex; align-items:center; justify-content:center; gap:36px;\n  box-shadow:0 3px 0 rgba(255,255,255,.4) inset, 0 -7px 20px rgba(0,0,0,.32) inset;\n  overflow:hidden;\n}\n/* bright light beam across the top */\n#banner .streak{\n  position:absolute; left:16%; right:16%; top:8px; height:7px; pointer-events:none;\n  background:radial-gradient(closest-side,\n     #ffffff, color-mix(in srgb,var(--glow) 85%,transparent) 55%, transparent);\n  filter:blur(2px); opacity:.95;\n}\n/* centred diamond ornaments on top + bottom edges */\n#banner .dia{\n  position:absolute; left:50%; width:15px; height:15px; rotate:45deg; z-index:3;\n  background:#ffffff; box-shadow:0 0 12px var(--glow), 0 0 0 2px var(--accent-deep);\n}\n#banner .dia.t{ top:-8px; transform:translateX(-50%); }\n#banner .dia.b{ bottom:-8px; transform:translateX(-50%); }\n/* end chevron accents near the points */\n#banner .tip{\n  position:absolute; top:50%; width:16px; height:48px; transform:translateY(-50%);\n  border:3px solid var(--gold-bright); opacity:.92;\n  filter:drop-shadow(0 0 5px color-mix(in srgb,var(--gold) 70%,transparent));\n}\n#banner .tip.l{ left:30px; border-right:none; }\n#banner .tip.r{ right:30px; border-left:none; }\n\n#banner .ttl{\n  font-size:62px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:#fff;\n  white-space:nowrap; line-height:1;\n  text-shadow:0 3px 6px rgba(0,0,0,.4), 0 0 24px color-mix(in srgb,var(--glow) 70%,transparent);\n}\n#banner .wheat{ width:20px; height:52px; color:var(--gold-bright); flex:none;\n  filter:drop-shadow(0 0 6px color-mix(in srgb,var(--gold) 70%,transparent)); }\n#banner .wheat svg{ width:100%; height:100%; display:block; }\n#banner .wheat.r{ scale:-1 1; }\n\n/* ============================================================\n   STAGE NAME (under the banner)\n   ============================================================ */\n#stage-name{\n  position:absolute; left:1183px; top:194px; transform:translateX(-50%); z-index:90;\n  display:flex; align-items:center; gap:24px; white-space:nowrap;\n}\n#stage-name .sn-id{\n  font-size:28px; font-weight:700; letter-spacing:.14em; text-transform:uppercase;\n  color:var(--ink); text-shadow:0 1px 0 rgba(255,255,255,.7), 0 2px 10px rgba(255,255,255,.5);\n}\n#stage-name .sn-sub{\n  font-size:18px; font-weight:600; letter-spacing:.28em; text-transform:uppercase;\n  color:var(--gold-deep); text-shadow:0 1px 0 rgba(255,255,255,.7), 0 2px 10px rgba(255,255,255,.5);\n}\n#stage-name .sn-dot{\n  width:9px; height:9px; rotate:45deg; flex:none;\n  background:var(--accent-bright); box-shadow:0 0 7px var(--glow);\n}\n\n/* ============================================================\n   SHARED GLASS PANEL + CORNER BRACKETS\n   ============================================================ */\n.glass{\n  background:var(--panel);\n  -webkit-backdrop-filter:blur(9px) saturate(125%); backdrop-filter:blur(9px) saturate(125%);\n  border:1.5px solid var(--hair); border-radius:16px;\n  box-shadow:0 1px 0 rgba(255,255,255,.85) inset, 0 0 0 1px rgba(255,255,255,.4),\n    0 24px 54px -24px rgba(20,49,95,.78);\n}\n.glass::after{ content:\"\"; position:absolute; inset:6px; border-radius:11px;\n  border:1px solid var(--hair-soft); pointer-events:none; }\n.corner{ position:absolute; width:16px; height:16px; pointer-events:none; z-index:4;\n  border:2px solid var(--accent-bright); opacity:.92; }\n.corner.tl{ left:9px; top:9px; border-right:none; border-bottom:none; }\n.corner.tr{ right:9px; top:9px; border-left:none; border-bottom:none; }\n.corner.bl{ left:9px; bottom:9px; border-right:none; border-top:none; }\n.corner.br{ right:9px; bottom:9px; border-left:none; border-top:none; }\n\n/* ============================================================\n   HERO 立繪 (left column) — full-bleed standee, top→bottom\n   ============================================================ */\n#hero{\n  position:absolute; left:0; top:0; width:500px; height:1080px; z-index:60;\n  overflow:hidden;\n}\n.hero-art{\n  position:absolute; inset:0; overflow:hidden;\n  /* soft-fade the interior (right) edge into the sky */\n  -webkit-mask-image:linear-gradient(90deg, #000 80%, transparent 100%);\n  mask-image:linear-gradient(90deg, #000 80%, transparent 100%);\n}\n.hero-art image-slot{ width:100%; height:100%; }\n/* bottom scrim so the nameplate reads on any art */\n.hero-art::before{\n  content:\"\"; position:absolute; inset:0; z-index:2; pointer-events:none;\n  background:linear-gradient(0deg,\n     color-mix(in srgb,var(--accent-deep) 80%,transparent) 0%,\n     color-mix(in srgb,var(--accent-deep) 26%,transparent) 14%, transparent 30%);\n}\n/* empty-state tint so the strip never looks broken before art is dropped */\n.hero-art:not(:has(image-slot[data-filled])){\n  background:linear-gradient(180deg,\n     var(--accent-pale), color-mix(in srgb,var(--accent) 28%,#fff) 70%,\n     color-mix(in srgb,var(--accent) 40%,#fff));\n}\n/* nameplate overlaid at the base of the standee */\n.hero-name{\n  position:absolute; left:0; right:0; bottom:46px; z-index:5; padding:0 40px;\n  display:flex; flex-direction:column; gap:7px; pointer-events:none;\n}\n.hero-name .nm{\n  font-size:34px; font-weight:700; letter-spacing:.06em; color:#fff; line-height:1;\n  text-transform:uppercase; text-shadow:0 2px 10px rgba(8,18,40,.75);\n}\n.hero-name .cls{\n  display:inline-flex; align-items:center; gap:9px; align-self:flex-start;\n  font-size:15px; font-weight:600; letter-spacing:.26em; text-transform:uppercase;\n  color:var(--gold-bright); text-shadow:0 1px 5px rgba(8,18,40,.7);\n}\n.hero-name .cls::before{ content:\"\"; width:20px; height:1.5px; background:var(--gold-bright);\n  box-shadow:0 0 6px var(--gold); }\n\n/* ============================================================\n   STATS PANEL (centre) + RANK (right) in one board\n   ============================================================ */\n#board{\n  position:absolute; left:520px; top:250px; width:1326px; height:432px; z-index:55;\n  display:grid; grid-template-columns:1fr 372px; padding:14px 14px 14px 24px;\n}\n/* faint snowflake/asterisk flourishes in the panel corners */\n#board .flourish{ position:absolute; z-index:3; color:var(--hair); pointer-events:none; opacity:.8; }\n#board .flourish svg{ width:26px; height:26px; display:block; }\n#board .flourish.tl{ left:18px; top:16px; }\n#board .flourish.tr{ right:18px; top:16px; }\n#board .flourish.bl{ left:18px; bottom:16px; }\n#board .flourish.br{ right:18px; bottom:16px; }\n\n/* ---- stats list ---- */\n.stats{ display:flex; flex-direction:column; justify-content:center;\n  padding:6px 30px 6px 18px; }\n.srow{\n  display:grid; grid-template-columns:52px 1fr auto 168px; align-items:center;\n  gap:8px; height:76px; position:relative;\n}\n.srow + .srow::before{\n  content:\"\"; position:absolute; left:8px; right:8px; top:0; height:1px;\n  background:linear-gradient(90deg, transparent, var(--hair-soft) 14%, var(--hair-soft) 86%, transparent);\n}\n.srow .ico{ width:38px; height:38px; display:grid; place-items:center; color:var(--accent); }\n.srow .ico svg{ width:34px; height:34px; display:block; }\n.srow .ico.coin{ color:var(--gold-deep); }\n.srow .lbl{ font-size:24px; font-weight:600; letter-spacing:.1em; text-transform:uppercase;\n  color:var(--ink); }\n.srow .val{ font-size:42px; font-weight:700; color:var(--accent-deep); line-height:1;\n  letter-spacing:.01em; justify-self:end; white-space:nowrap; }\n.srow .val.mono{ font-family:var(--font-mono); font-weight:400; font-size:40px; }\n.srow .val small{ font-size:26px; font-weight:600; color:var(--ink-soft); margin-left:4px; }\n.srow .badge{ justify-self:end; }\n\n/* NEW RECORD chamfer tag */\n.tag-new{\n  --n:8px; display:inline-flex; align-items:center; gap:7px; padding:7px 16px;\n  background:color-mix(in srgb,var(--gold) 18%, #fff);\n  border:1.6px solid var(--gold-deep);\n  clip-path:polygon(var(--n) 0,100% 0,100% calc(100% - var(--n)),calc(100% - var(--n)) 100%,0 100%,0 var(--n));\n  color:var(--gold-deep); font-size:14px; font-weight:700; letter-spacing:.14em;\n  text-transform:uppercase; white-space:nowrap;\n  box-shadow:0 0 12px color-mix(in srgb,var(--gold) 35%,transparent);\n}\n.tag-new svg{ width:14px; height:14px; }\n/* PERFECT plain text */\n.tag-perfect{ font-size:18px; font-weight:700; letter-spacing:.2em; text-transform:uppercase;\n  color:var(--ink-soft); }\n\n/* ---- rank column ---- */\n.rank{ position:relative; display:flex; flex-direction:column; align-items:center;\n  justify-content:center; gap:14px; padding:10px 8px; }\n.rank::before{ content:\"\"; position:absolute; left:0; top:14%; bottom:14%; width:1px;\n  background:linear-gradient(180deg, transparent, var(--hair) 16%, var(--hair) 84%, transparent); }\n.rank .rk-label{ font-size:24px; font-weight:600; letter-spacing:.26em; text-transform:uppercase;\n  color:var(--ink); }\n.rank .emblem{ position:relative; width:248px; height:230px; display:grid; place-items:center; }\n.rank .emblem svg.wreath{ position:absolute; inset:0; width:100%; height:100%; }\n.rank .emblem .ring{\n  position:absolute; left:50%; top:48%; transform:translate(-50%,-50%);\n  width:150px; height:150px; border-radius:50%;\n  border:1.5px solid var(--hair-soft);\n  box-shadow:0 0 0 6px color-mix(in srgb,#fff 50%,transparent) inset;\n}\n.rank .emblem .glyph{ position:relative; z-index:2; display:grid; place-items:center;\n  width:150px; height:150px; }\n/* placeholder dashes */\n.rank .dashes{ display:flex; gap:12px; }\n.rank .dashes i{ width:30px; height:13px; border-radius:3px; background:var(--accent);\n  box-shadow:0 1px 0 rgba(255,255,255,.5) inset; }\n/* revealed rank letter */\n.rank .letter{\n  font-size:128px; font-weight:700; font-style:italic; line-height:.8; letter-spacing:-.04em;\n  background:linear-gradient(180deg, var(--gold-bright), var(--gold) 52%, var(--gold-deep));\n  -webkit-background-clip:text; background-clip:text; color:transparent;\n  filter:drop-shadow(0 4px 10px rgba(140,90,10,.5));\n  opacity:0; transform:scale(1.6); display:none;\n}\n.rank.revealed .dashes{ display:none; }\n.rank.revealed .letter{ display:block; animation:rank-stamp .5s cubic-bezier(.2,1.5,.4,1) forwards; }\n@keyframes rank-stamp{ to{ opacity:1; transform:scale(1); } }\n.rank .rk-state{ font-size:18px; font-weight:700; letter-spacing:.22em; text-transform:uppercase;\n  color:var(--ink-soft); }\n.rank.revealed .rk-state{ color:var(--gold-deep); }\n/* evaluating shimmer on the ring */\n.rank:not(.revealed) .ring{ animation:eval-pulse 1.5s ease-in-out infinite; }\n@keyframes eval-pulse{ 0%,100%{ box-shadow:0 0 0 6px color-mix(in srgb,#fff 50%,transparent) inset; }\n  50%{ box-shadow:0 0 0 6px color-mix(in srgb,#fff 50%,transparent) inset,\n       0 0 22px 2px var(--glow); border-color:var(--accent-bright); } }\n\n/* ============================================================\n   ACTION BUTTONS\n   ============================================================ */\n#actions{\n  position:absolute; left:520px; top:716px; width:1326px; z-index:70;\n  display:flex; gap:26px;\n}\n.btn{\n  flex:1; --n:14px; position:relative; cursor:pointer; border:none; background:var(--hair);\n  clip-path:polygon(var(--n) 0, calc(100% - var(--n)) 0, 100% var(--n),\n    100% calc(100% - var(--n)), calc(100% - var(--n)) 100%, var(--n) 100%,\n    0 calc(100% - var(--n)), 0 var(--n));\n  filter:drop-shadow(0 14px 26px rgba(20,49,95,.4));\n  transition:transform .14s ease, filter .14s ease;\n  font-family:var(--font-hud);\n}\n.btn .face{\n  --n:13px; position:absolute; inset:1.8px;\n  background:var(--panel);\n  -webkit-backdrop-filter:blur(9px) saturate(125%); backdrop-filter:blur(9px) saturate(125%);\n  clip-path:polygon(var(--n) 0, calc(100% - var(--n)) 0, 100% var(--n),\n    100% calc(100% - var(--n)), calc(100% - var(--n)) 100%, var(--n) 100%,\n    0 calc(100% - var(--n)), 0 var(--n));\n  display:flex; align-items:center; justify-content:center; gap:16px;\n  box-shadow:0 1px 0 rgba(255,255,255,.8) inset;\n}\n.btn{ height:92px; }\n.btn .bi{ width:34px; height:34px; display:grid; place-items:center; color:var(--accent); flex:none; }\n.btn .bi svg{ width:34px; height:34px; display:block; }\n.btn .bt{ font-size:26px; font-weight:700; letter-spacing:.16em; text-transform:uppercase;\n  color:var(--ink); }\n.btn:not(.locked):hover{ transform:translateY(-3px); filter:drop-shadow(0 20px 32px rgba(20,49,95,.5)); }\n.btn:not(.locked):active{ transform:translateY(-1px); }\n\n/* primary (next stage) emphasis when unlocked — kept here for completeness */\n.btn.primary .face{ background:linear-gradient(180deg, var(--accent-bright), var(--accent) 50%, var(--accent-deep)); }\n.btn.primary .bi{ color:#fff; }\n.btn.primary .bt{ color:#fff; text-shadow:0 1px 3px rgba(0,0,0,.35); }\n\n/* locked / disabled */\n.btn.locked{ cursor:not-allowed; filter:drop-shadow(0 8px 16px rgba(20,49,95,.25)); }\n.btn.locked .face{ background:color-mix(in srgb,var(--accent) 8%, #eef3fb); }\n.btn.locked .bi,\n.btn.locked .bt{ color:color-mix(in srgb,var(--ink-soft) 60%, #b9c6da); }\n\n/* confirm flash */\n#flash{ position:absolute; inset:0; z-index:300; background:#fff; opacity:0; pointer-events:none; }\n#flash.go{ animation:flash .55s ease-out; }\n@keyframes flash{ 0%{ opacity:0; } 18%{ opacity:.9; } 100%{ opacity:0; } }\n\n/* ============================================================\n   ENTRANCE — transform-only so the resting state is ALWAYS visible\n   (opacity stays 1). If the document timeline is throttled\n   (offscreen iframe, html-to-image, print/PDF/PPTX export) a stalled\n   transform just leaves content slightly offset but never blank.\n   ============================================================ */\n#banner, #stage-name, #hero, #board, #actions{\n  transition:transform .55s ease-out;\n}\n@media (prefers-reduced-motion: no-preference){\n  .preload #banner{ transform:translateX(-50%) translateY(-24px); }\n  .preload #stage-name{ transform:translateX(-50%) translateY(-14px); }\n  .preload #hero{ transform:translateX(-30px); }\n  .preload #board{ transform:translateY(28px); }\n  .preload #actions{ transform:translateY(28px); }\n  #stage-name{ transition-delay:.06s; }\n  #hero{ transition-delay:.08s; }\n  #board{ transition-delay:.12s; }\n  #actions{ transition-delay:.24s; }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div id=\"stage\">\n  <div id=\"frame\" class=\"preload\" data-screen-label=\"Stage Result\">\n\n    <!-- ============== SKY BACKDROP ============== -->\n    <div id=\"bg\">\n      <div class=\"sky\"><div class=\"clouds\" id=\"clouds\"><\u002Fdiv><\u002Fdiv>\n      <image-slot id=\"bg-slot\" shape=\"rect\" placeholder=\"Drop palace backdrop art\"><\u002Fimage-slot>\n    <\u002Fdiv>\n\n    <!-- ============== TOP BANNER ============== -->\n    <div id=\"banner\">\n      <div class=\"fill\">\n        <div class=\"streak\"><\u002Fdiv>\n        <span class=\"wheat\"><svg viewBox=\"0 0 18 46\" fill=\"currentColor\" aria-hidden=\"true\">\n          <rect x=\"8\" y=\"6\" width=\"2\" height=\"38\" rx=\"1\"><\u002Frect>\n          <path d=\"M9 14c-4 0-6-2.4-7-6.4 4.4 0 7 2.4 7 6.4z\"><\u002Fpath><path d=\"M9 14c4 0 6-2.4 7-6.4-4.4 0-7 2.4-7 6.4z\"><\u002Fpath>\n          <path d=\"M9 23c-3.6 0-5.6-2.2-6.5-6 4 0 6.5 2.2 6.5 6z\"><\u002Fpath><path d=\"M9 23c3.6 0 5.6-2.2 6.5-6-4 0-6.5 2.2-6.5 6z\"><\u002Fpath>\n          <path d=\"M9 32c-3.2 0-5-2-5.8-5.6 3.6 0 5.8 2 5.8 5.6z\"><\u002Fpath><path d=\"M9 32c3.2 0 5-2 5.8-5.6-3.6 0-5.8 2-5.8 5.6z\"><\u002Fpath>\n        <\u002Fsvg><\u002Fspan>\n        <span class=\"ttl\">Stage Clear<\u002Fspan>\n        <span class=\"wheat r\"><svg viewBox=\"0 0 18 46\" fill=\"currentColor\" aria-hidden=\"true\">\n          <rect x=\"8\" y=\"6\" width=\"2\" height=\"38\" rx=\"1\"><\u002Frect>\n          <path d=\"M9 14c-4 0-6-2.4-7-6.4 4.4 0 7 2.4 7 6.4z\"><\u002Fpath><path d=\"M9 14c4 0 6-2.4 7-6.4-4.4 0-7 2.4-7 6.4z\"><\u002Fpath>\n          <path d=\"M9 23c-3.6 0-5.6-2.2-6.5-6 4 0 6.5 2.2 6.5 6z\"><\u002Fpath><path d=\"M9 23c3.6 0 5.6-2.2 6.5-6-4 0-6.5 2.2-6.5 6z\"><\u002Fpath>\n          <path d=\"M9 32c-3.2 0-5-2-5.8-5.6 3.6 0 5.8 2 5.8 5.6z\"><\u002Fpath><path d=\"M9 32c3.2 0 5-2 5.8-5.6-3.6 0-5.8 2-5.8 5.6z\"><\u002Fpath>\n        <\u002Fsvg><\u002Fspan>\n      <\u002Fdiv>\n      <span class=\"dia t\"><\u002Fspan><span class=\"dia b\"><\u002Fspan>\n      <span class=\"tip l\"><\u002Fspan><span class=\"tip r\"><\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- ============== STAGE NAME ============== -->\n    <div id=\"stage-name\">\n      <span class=\"sn-id\">White Palace 1-1<\u002Fspan>\n      <span class=\"sn-dot\"><\u002Fspan>\n      <span class=\"sn-sub\">The First Gate<\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- ============== HERO 立繪 (left, full-bleed standee) ============== -->\n    <div id=\"hero\">\n      <div class=\"hero-art\">\n        <img id=\"hero-portrait\" src=\"/assets/results/yuuta-stage-result-standee.png\" alt=\"Yuuta Tsubasa full-body illustration\" style=\"display:block;width:100%;height:100%;object-fit:cover;object-position:center top\">\n        <div class=\"hero-name\">\n          <span class=\"nm\">Yuuta Tsubasa<\u002Fspan>\n          <span class=\"cls\">Paladin<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ============== STATS + RANK BOARD ============== -->\n    <div id=\"board\" class=\"glass\">\n      <span class=\"corner tl\"><\u002Fspan><span class=\"corner tr\"><\u002Fspan>\n      <span class=\"corner bl\"><\u002Fspan><span class=\"corner br\"><\u002Fspan>\n      <span class=\"flourish tl\"><\u002Fspan><span class=\"flourish tr\"><\u002Fspan>\n      <span class=\"flourish bl\"><\u002Fspan><span class=\"flourish br\"><\u002Fspan>\n\n      <!-- stats -->\n      <div class=\"stats\">\n        <div class=\"srow\">\n          <span class=\"ico\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 7v5l3.5 2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <span class=\"lbl\">Clear Time<\u002Fspan>\n          <span class=\"val mono\" data-count-time=\"10.13\">00:10.13<\u002Fspan>\n          <span class=\"badge\"><span class=\"tag-new\"><svg viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M12 2l2.6 6.6L21 9.3l-5 4.5 1.6 6.7L12 17l-5.6 3.5L8 13.8l-5-4.5 6.4-.7z\"><\u002Fpath><\u002Fsvg>New Record<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n\n        <div class=\"srow\">\n          <span class=\"ico coin\"><svg viewBox=\"0 0 24 24\" fill=\"none\"><circle cx=\"12\" cy=\"12\" r=\"9.5\" fill=\"currentColor\"><\u002Fcircle><rect x=\"9\" y=\"6.5\" width=\"6\" height=\"11\" rx=\"2\" fill=\"rgba(0,0,0,.22)\"><\u002Frect><\u002Fsvg><\u002Fspan>\n          <span class=\"lbl\">Coins<\u002Fspan>\n          <span class=\"val\"><span data-count=\"11\">11<\u002Fspan><small>/ 17<\u002Fsmall><\u002Fspan>\n          <span class=\"badge\"><span class=\"tag-new\"><svg viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M12 2l2.6 6.6L21 9.3l-5 4.5 1.6 6.7L12 17l-5.6 3.5L8 13.8l-5-4.5 6.4-.7z\"><\u002Fpath><\u002Fsvg>New Record<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n\n        <div class=\"srow\">\n          <span class=\"ico\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linejoin=\"round\"><path d=\"M12 2.5 4.5 5.5v6c0 4.8 3.2 8.4 7.5 10 4.3-1.6 7.5-5.2 7.5-10v-6z\"><\u002Fpath><path d=\"M12 9v6M9 12h6\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <span class=\"lbl\">Damage Taken<\u002Fspan>\n          <span class=\"val\" data-count=\"0\">0<\u002Fspan>\n          <span class=\"badge\"><span class=\"tag-perfect\">Perfect<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n\n        <div class=\"srow\">\n          <span class=\"ico\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14.5 14.5 21 21M16 4l4 .5.5 4-9 9-4.5-4.5z\"><\u002Fpath><path d=\"M9.5 14.5 3 21M8 4 4 4.5 3.5 8.5l9 9 4.5-4.5z\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <span class=\"lbl\">Enemies Defeated<\u002Fspan>\n          <span class=\"val\"><span data-count=\"17\">17<\u002Fspan><small>/ 17<\u002Fsmall><\u002Fspan>\n          <span class=\"badge\"><span class=\"tag-perfect\">Perfect<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n\n        <div class=\"srow\">\n          <span class=\"ico\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linejoin=\"round\"><path d=\"M6 21V4\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M6 4h11l-2.5 4L17 12H6\" fill=\"currentColor\" stroke=\"none\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <span class=\"lbl\">Checkpoints<\u002Fspan>\n          <span class=\"val\"><span data-count=\"3\">3<\u002Fspan><small>/ 3<\u002Fsmall><\u002Fspan>\n          <span class=\"badge\"><span class=\"tag-perfect\">Perfect<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- rank -->\n      <div class=\"rank\" id=\"rank\">\n        <span class=\"rk-label\">Rank<\u002Fspan>\n        <div class=\"emblem\">\n          <svg class=\"wreath\" id=\"wreath\" viewBox=\"0 0 260 240\" aria-hidden=\"true\"><\u002Fsvg>\n          <div class=\"ring\"><\u002Fdiv>\n          <div class=\"glyph\">\n            <div class=\"dashes\"><i><\u002Fi><i><\u002Fi><\u002Fdiv>\n            <div class=\"letter\" id=\"rank-letter\">S<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <span class=\"rk-state\" id=\"rank-state\">Under Evaluation<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ============== ACTIONS ============== -->\n    <div id=\"actions\">\n      <button class=\"btn\" id=\"btn-retry\">\n        <div class=\"face\">\n          <span class=\"bi\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3.5 12a8.5 8.5 0 1 1 2.6 6.1\"><\u002Fpath><path d=\"M3.2 19.5 5.8 18l-1.3-2.8\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <span class=\"bt\">Retry<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fbutton>\n\n      <button class=\"btn\" id=\"btn-select\">\n        <div class=\"face\">\n          <span class=\"bi\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linejoin=\"round\"><path d=\"M4 21V9.5L12 4l8 5.5V21\"><\u002Fpath><path d=\"M9.5 21v-6a2.5 2.5 0 0 1 5 0v6\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M3 21h18\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <span class=\"bt\">Stage Select<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fbutton>\n\n      <button class=\"btn locked\" id=\"btn-next\" disabled=\"\">\n        <div class=\"face\">\n          <span class=\"bi\"><svg viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M12 1.8a4.6 4.6 0 0 0-4.6 4.6V9H6.2A1.7 1.7 0 0 0 4.5 10.7v9.1A1.7 1.7 0 0 0 6.2 21.5h11.6a1.7 1.7 0 0 0 1.7-1.7v-9.1A1.7 1.7 0 0 0 17.8 9h-1.2V6.4A4.6 4.6 0 0 0 12 1.8zm0 2.1a2.5 2.5 0 0 1 2.5 2.5V9h-5V6.4A2.5 2.5 0 0 1 12 3.9z\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <span class=\"bt\">Next Stage<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fbutton>\n    <\u002Fdiv>\n\n    <div id=\"flash\"><\u002Fdiv>\n\n  <\u002Fdiv><!-- /frame -->\n<\u002Fdiv><!-- /stage -->\n\n\n\n<script src=\"4134a978-0513-457d-944e-76bddfa02207\"><\u002Fscript>\n<script src=\"f7e39ea2-c623-4a37-b0e4-6ef64466aae0\"><\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
